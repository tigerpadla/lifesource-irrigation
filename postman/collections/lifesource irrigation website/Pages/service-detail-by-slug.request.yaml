$kind: http-request
name: 'service detail by slug'
method: GET
url: '{{baseUrl}}/services/:slug/'
order: 1200
pathVariables:
  - key: slug
    value: '{{serviceSlug}}'
    description: 'Representative service slug (irrigation, gardening, lighting, terrace-refurbishment).'
event:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '  pm.response.to.have.status(200);'
        - '});'
        - 'pm.test("Content-Type is HTML", function () {'
        - '  const contentType = pm.response.headers.get("Content-Type") || "";'
        - '  pm.expect(contentType.toLowerCase()).to.include("text/html");'
        - '});'
        - 'pm.test("Service detail contains structured service content", function () {'
        - '  const body = pm.response.text();'
        - '  pm.expect(body).to.include("What We Offer");'
        - '});'
