$kind: http-request
name: 'newsletter list page'
method: GET
url: '{{baseUrl}}/newsletter/'
order: 1700
event:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '  pm.response.to.have.status(200);'
        - '});'
        - 'pm.test("Content-Type is HTML", function () {'
        - '  const contentType = pm.response.headers.get("Content-Type") || "";'
        - '  pm.expect(contentType.toLowerCase()).to.include("text/html");'
        - '});'
        - 'pm.test("Newsletter list contains archive heading", function () {'
        - '  const body = pm.response.text();'
        - '  pm.expect(body).to.include("Newsletter Archive");'
        - '});'
