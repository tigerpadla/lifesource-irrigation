$kind: http-request
name: 'gallery page filtered by category'
method: GET
url: '{{baseUrl}}/gallery/'
order: 1400
queryParams:
  - key: category
    value: '{{galleryCategory}}'
    description: 'Project category slug used by gallery filter links.'
event:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '  pm.response.to.have.status(200);'
        - '});'
        - 'pm.test("Content-Type is HTML", function () {'
        - '  const contentType = pm.response.headers.get("Content-Type") || "";'
        - '  pm.expect(contentType.toLowerCase()).to.include("text/html");'
        - '});'
        - 'pm.test("Filtered gallery still renders gallery page", function () {'
        - '  const body = pm.response.text();'
        - '  pm.expect(body).to.include("Our Gallery");'
        - '});'
