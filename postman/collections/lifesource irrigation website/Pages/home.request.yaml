$kind: http-request
name: 'home page'
method: GET
url: '{{baseUrl}}/'
order: 1000
event:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '  pm.response.to.have.status(200);'
        - '});'
        - 'pm.test("Content-Type is HTML", function () {'
        - '  const contentType = pm.response.headers.get("Content-Type") || "";'
        - '  pm.expect(contentType.toLowerCase()).to.include("text/html");'
        - '});'
        - 'pm.test("Home page contains hero branding text", function () {'
        - '  const body = pm.response.text();'
        - '  pm.expect(body).to.include("Lifesource Irrigation");'
        - '});'
