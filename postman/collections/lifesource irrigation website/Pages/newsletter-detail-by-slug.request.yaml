$kind: http-request
name: 'newsletter detail by slug'
method: GET
url: '{{baseUrl}}/newsletter/:slug/'
order: 1800
pathVariables:
  - key: slug
    value: '{{newsletterSlug}}'
    description: 'Published newsletter slug from database. Replace variable as needed.'
event:
  - listen: test
    script:
      type: text/javascript
      exec:
        - 'pm.test("Status code is 200", function () {'
        - '  pm.response.to.have.status(200);'
        - '});'
        - 'pm.test("Content-Type is HTML", function () {'
        - '  const contentType = pm.response.headers.get("Content-Type") || "";'
        - '  pm.expect(contentType.toLowerCase()).to.include("text/html");'
        - '});'
        - 'pm.test("Newsletter detail contains article navigation text", function () {'
        - '  const body = pm.response.text();'
        - '  pm.expect(body).to.include("Back to Newsletter Archive");'
        - '});'
